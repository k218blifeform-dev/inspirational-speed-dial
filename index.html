  <body id="main" style="opacity: 0">
    <h1 id="whymt">What have you made today?</h1>
    <div id="searchBar">

        src="search.svg"
        alt="search"
      />

          type="text"
          id="search"
          name="q"

    <main id="favorites" aria-label="Favorites"></main>

    <audio id="audio" controls autoplay loop>
      <source src="https://file2.rainfor.me/rfm/standard.ogg" type="audio/ogg"/>
    </audio>

    <footer>
      What Have You Made Today? - A simple, fast, and inspirational speed dial for your browser.<br />
      Made for Chrome <img src="favicon.png"> :: By Corndog <img src="corndog.png" style="height: 2em; vertical-align: -5px;">

</html>
